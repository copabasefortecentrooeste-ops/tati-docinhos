  <!-- White checkmark -->
  <polyline points="35,48 45,58 65,36" fill="none" stroke="white" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Yellow speed lines (left side) -->
  <rect x="2" y="40" width="14" height="5" rx="2.5" fill="#FFD700"/>
  <rect x="5" y="49" width="10" height="4" rx="2" fill="#FFD700"/>
